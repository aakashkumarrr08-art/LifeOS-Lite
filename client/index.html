<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LifeOS Lite is a student productivity dashboard built for a university semester project."
    />
    <script>
      const storedTheme = localStorage.getItem('lifeos_lite_theme');
      const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const useDarkMode = storedTheme ? storedTheme === 'dark' : prefersDarkMode;

      if (useDarkMode) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <title>LifeOS Lite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
